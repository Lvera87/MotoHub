<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctenos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 mb-4">Contáctenos</h1>
                        <form id="contactForm" class="needs-validation" novalidate>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="nombre" class="form-label">Nombre completo</label>
                                    <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Tu nombre" required minlength="2">
                                    <div class="invalid-feedback">Ingresa tu nombre.</div>
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label">Correo electrónico</label>
                                    <input type="email" class="form-control" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
                                    <div class="invalid-feedback">Ingresa un correo válido.</div>
                                </div>
                                <div class="col-md-6">
                                    <label for="telefono" class="form-label">Teléfono (opcional)</label>
                                    <input type="tel" class="form-control" id="telefono" name="telefono" inputmode="tel" pattern="^[0-9+\-\s()]{7,}$" placeholder="+57 300 123 4567">
                                    <div class="invalid-feedback">Ingresa un teléfono válido.</div>
                                </div>
                                <div class="col-md-6">
                                    <label for="asunto" class="form-label">Asunto</label>
                                    <select class="form-select" id="asunto" name="asunto" required>
                                        <option value="" selected disabled>Selecciona una opción</option>
                                        <option value="consulta">Consulta</option>
                                        <option value="soporte">Soporte</option>
                                        <option value="sugerencia">Sugerencia</option>
                                        <option value="otro">Otro</option>
                                    </select>
                                    <div class="invalid-feedback">Selecciona un asunto.</div>
                                </div>
                                <div class="col-12">
                                    <label for="mensaje" class="form-label">Mensaje</label>
                                    <textarea class="form-control" id="mensaje" name="mensaje" rows="4" placeholder="Cuéntanos en qué podemos ayudarte..." required minlength="10"></textarea>
                                    <div class="invalid-feedback">Escribe un mensaje de al menos 10 caracteres.</div>
                                </div>
                                <div class="col-12">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="" id="acepto" required>
                                        <label class="form-check-label" for="acepto">Acepto la política de privacidad.</label>
                                        <div class="invalid-feedback">Debes aceptar antes de enviar.</div>
                                    </div>
                                </div>
                                <div class="col-12 d-grid mt-2">
                                    <button type="submit" class="btn btn-primary btn-lg">Enviar</button>
                                </div>
                            </div>
                        </form>
                        <div id="alertaExito" class="alert alert-success mt-4 d-none" role="alert" aria-live="polite">
                            ¡Gracias! Tu mensaje ha sido enviado.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (() => {
            'use strict';
            const form = document.getElementById('contactForm');
            const alerta = document.getElementById('alertaExito');

            form.addEventListener('submit', (event) => {
                event.preventDefault();
                event.stopPropagation();

                if (form.checkValidity()) {
                    alerta.classList.remove('d-none');
                    form.reset();
                    form.classList.remove('was-validated');
                    setTimeout(() => alerta.classList.add('d-none'), 5000);
                } else {
                    alerta.classList.add('d-none');
                }

                form.classList.add('was-validated');
            }, false);
        })();
    </script>
</body>
</html>
